<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>KRONOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#080808;color:#f0f0f0;font-family:'DM Sans',-apple-system,sans-serif;font-size:14px;}

/* scrollable content areas only */
.scroll{overflow-y:auto;overflow-x:hidden;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

/* ── Pure monochrome system ── */
:root{
  --bg:#080808;
  --s1:#0f0f0f;
  --s2:#141414;
  --s3:#1a1a1a;
  --b1:#222222;
  --b2:#2e2e2e;
  --b3:#3a3a3a;
  --accent:#f0f0f0;
  --text:#f0f0f0;
  --g1:#909090;
  --g2:#555555;
  --g3:#333333;
  --g4:#1e1e1e;
  --font-display:'Syne',sans-serif;
  --radius:6px;
  --radius-sm:4px;
  --shadow:0 4px 24px rgba(0,0,0,.7);
  --shadow-lg:0 12px 48px rgba(0,0,0,.9);
}

input,select,textarea{font-family:'DM Sans',sans-serif;color:var(--text);}
input::placeholder,textarea::placeholder{color:var(--g2);}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator,
input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer;}
select{-webkit-appearance:none;appearance:none;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}

/* Layout */
#app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{
  width:52px;background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;align-items:center;
  padding:22px 0;flex-shrink:0;height:100vh;position:relative;z-index:10;
  transition:width .22s cubic-bezier(.4,0,.2,1);
}
#sidebar.open{width:210px;}
#sidebar.open .nav-label{opacity:1;transform:translateX(0);}
#sidebar.open .sidebar-logo{letter-spacing:.2em;font-size:12px;}

.sidebar-logo{
  font-family:var(--font-display);font-size:15px;font-weight:800;
  letter-spacing:.26em;color:var(--text);margin-bottom:36px;
  white-space:nowrap;overflow:hidden;transition:all .22s;cursor:pointer;
}

.nav-item{
  width:100%;display:flex;align-items:center;padding:10px 16px;gap:14px;
  cursor:pointer;color:var(--g2);border-left:2px solid transparent;
  transition:all .14s;position:relative;white-space:nowrap;overflow:hidden;
}
.nav-item:hover{color:var(--g1);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--text);border-left-color:var(--text);background:rgba(255,255,255,.05);}
.nav-icon{font-size:13px;flex-shrink:0;width:20px;text-align:center;}
.nav-label{font-size:10px;font-weight:600;opacity:0;transition:opacity .18s,transform .18s;
  letter-spacing:.1em;text-transform:uppercase;transform:translateX(-8px);}
#sidebar.open .nav-label{opacity:1;transform:translateX(0);}

.sidebar-bottom{margin-top:auto;width:100%;}
.nav-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--text);color:var(--bg);font-size:9px;font-weight:800;
  border-radius:3px;padding:1px 5px;min-width:16px;text-align:center;}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── Topbar ── */
#topbar{
  height:50px;background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;
}
.page-title{font-family:var(--font-display);font-size:10px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;flex:1;color:var(--g2);}
.topbar-items{display:flex;align-items:center;gap:10px;}
.time-display{font-size:11px;color:var(--g2);letter-spacing:.08em;font-variant-numeric:tabular-nums;}
.xp-pill{background:transparent;border:1px solid var(--b2);border-radius:3px;
  padding:3px 10px;font-size:9px;font-weight:700;color:var(--g1);letter-spacing:.1em;text-transform:uppercase;}
.top-btn{width:32px;height:32px;border-radius:var(--radius-sm);background:transparent;
  border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .14s;color:var(--g2);}
.top-btn:hover{background:var(--s2);color:var(--g1);border-color:var(--b2);}
.user-chip{display:flex;align-items:center;gap:9px;background:transparent;
  border:1px solid var(--b1);border-radius:var(--radius-sm);padding:5px 12px;
  cursor:pointer;transition:all .14s;}
.user-chip:hover{background:var(--s2);border-color:var(--b2);}
.avatar{width:22px;height:22px;border-radius:3px;background:var(--text);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--bg);flex-shrink:0;}
.user-name{font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--g1);}
.lang-select{background:transparent;border:1px solid var(--b1);border-radius:3px;
  padding:3px 8px;font-size:10px;color:var(--g2);outline:none;letter-spacing:.06em;}

/* ── Content ── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px;}
#content::-webkit-scrollbar{width:2px;}
#content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:18px;}
.card+.card{margin-top:12px;}
.card-inner{background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius-sm);padding:13px;}

/* ── Grids ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* ── Section label ── */
.section-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--g2);margin-bottom:14px;}

/* ── Progress ── */
.pbar{height:1px;background:var(--b1);border-radius:1px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:1px;background:var(--text);transition:width .4s ease;}

/* ── Eisenhower Quad Picker ── */
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.quad-cell{
  border-radius:var(--radius-sm);padding:13px 12px;cursor:pointer;
  border:1px solid var(--b1);transition:all .16s;text-align:left;background:transparent;
}
.quad-cell:hover{border-color:var(--b3);background:var(--s2);}
.quad-cell.selected{border-color:var(--text);background:var(--s2);}
.quad-cell-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text);margin-bottom:4px;}
.quad-cell-sub{font-size:10px;color:var(--g2);line-height:1.4;}
.quad-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:2px;
  border:1px solid var(--b2);font-size:9px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--g1);background:var(--s3);}

/* ── KPI ── */
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1;letter-spacing:-.5px;}
.kpi-label{font-size:9px;color:var(--g2);margin-top:8px;letter-spacing:.12em;text-transform:uppercase;}

/* ── Inputs ── */
.inp{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius-sm);
  padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .14s;}
.inp:focus{border-color:var(--b3);}
.inp-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);margin-bottom:7px;}

/* ── Buttons ── */
.btn{border:none;border-radius:var(--radius-sm);padding:9px 18px;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;transition:all .14s;}
/* Primary = white on black */
.btn-red{background:var(--text);color:var(--bg);}
.btn-red:hover{background:#d8d8d8;}
/* Ghost = outlined */
.btn-ghost{background:transparent;color:var(--g1);border:1px solid var(--b2);}
.btn-ghost:hover{color:var(--text);border-color:var(--b3);background:var(--s2);}
.btn-sm{padding:5px 11px;font-size:9px;}
.btn:disabled{opacity:.2;cursor:not-allowed;}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:2px 6px;border-radius:2px;
  font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* ── Divider ── */
.div{height:1px;background:var(--b1);margin:12px 0;}

/* ── Checkbox ── */
.chk{width:15px;height:15px;border-radius:3px;border:1px solid var(--b3);background:transparent;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s;}
.chk:hover{border-color:var(--g2);}
.chk.on{background:var(--text);border-color:var(--text);}
.chk-dot{width:7px;height:7px;background:var(--bg);border-radius:1px;}

/* ── Streak ── */
.streak-num{color:var(--text);font-weight:700;}

/* ── Habit heatmap ── */
.hmap{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-top:9px;}
.hmap-cell{aspect-ratio:1;border-radius:2px;background:var(--b1);}
.hmap-cell.done{background:var(--g1);}
.hmap-cell.today{outline:1px solid var(--g1);outline-offset:1px;}

/* ── Focus ── */
.focus-time{font-family:var(--font-display);font-size:68px;font-weight:700;letter-spacing:-2px;line-height:1;}

/* ── Board (Kanban) ── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.board-col{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:16px;min-height:280px;}
.board-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius-sm);
  padding:13px;margin-bottom:8px;cursor:pointer;transition:border-color .14s;}
.board-card:hover{border-color:var(--b2);}

/* ── Toast ── */
#toast-area{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--s1);border:1px solid var(--b2);border-radius:var(--radius-sm);
  padding:11px 15px;display:flex;gap:11px;align-items:flex-start;min-width:240px;max-width:320px;
  pointer-events:auto;box-shadow:var(--shadow-lg);}
.toast-icon{font-size:14px;flex-shrink:0;color:var(--g2);}
.toast-t{font-size:12px;font-weight:600;margin-bottom:2px;letter-spacing:.02em;}
.toast-b{font-size:10px;color:var(--g1);line-height:1.5;}

/* ── Auth ── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;}
.auth-card{width:100%;max-width:340px;}
.auth-logo{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:.14em;margin-bottom:4px;color:var(--text);}
.auth-logo span{color:var(--text);}
.auth-sub{font-size:9px;color:var(--g2);margin-bottom:28px;letter-spacing:.14em;text-transform:uppercase;}
.auth-tab{flex:1;background:none;border:none;padding:11px 0;font-size:10px;font-weight:700;
  color:var(--g2);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid transparent;transition:all .14s;}
.auth-tab.on{color:var(--text);border-bottom-color:var(--text);}

/* ── Splash ── */
.splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.splash-word{display:flex;gap:1px;margin-bottom:16px;}
.splash-l{font-family:var(--font-display);font-size:52px;font-weight:800;letter-spacing:-1px;color:var(--text);opacity:0;}
.splash-line{height:1px;background:var(--text);width:0;margin-bottom:14px;transition:width .4s ease;}
.splash-sub{font-size:9px;letter-spacing:.36em;text-transform:uppercase;color:var(--g2);opacity:0;}

/* ── Rank ── */
.rank-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:3px;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}

/* ── Ring SVG ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-inner{position:absolute;text-align:center;}

/* ── Transitions ── */
.fade-in{animation:fi .14s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Quad dropdown (legacy compat) ── */
.quad-select{position:relative;display:inline-block;}
.quad-select-btn{background:transparent;border:1px solid var(--b1);border-radius:3px;padding:2px 7px;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.quad-select-btn:hover{border-color:var(--b2);color:var(--g1);}
.quad-dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--s2);border:1px solid var(--b2);
  border-radius:var(--radius-sm);z-index:50;min-width:180px;box-shadow:var(--shadow);overflow:hidden;}
.quad-option{padding:9px 13px;font-size:10px;font-weight:500;cursor:pointer;letter-spacing:.04em;
  transition:background .1s;border-bottom:1px solid var(--b1);}
.quad-option:last-child{border-bottom:none;}
.quad-option:hover{background:var(--s3);}
.quad-option.active{color:var(--text);}

/* ── Onboarding Tour ── */
.tour-overlay{position:fixed;inset:0;z-index:900;pointer-events:none;}
.tour-spotlight{position:fixed;z-index:901;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.78);pointer-events:none;transition:all .35s cubic-bezier(.4,0,.2,1);}
.tour-card{position:fixed;z-index:902;background:var(--s1);border:1px solid var(--b2);border-radius:8px;width:300px;box-shadow:0 16px 48px rgba(0,0,0,.9);animation:fi .2s ease both;}
.tour-step-dot{width:6px;height:6px;border-radius:50%;background:var(--b2);transition:background .2s;}
.tour-step-dot.on{background:var(--text);}

/* ── Finance ── */
.fin-kpi{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:4px;}
.fin-kpi-val{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.fin-kpi-lbl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);}
.txn-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);}
.txn-row:last-child{border-bottom:none;}
.txn-icon{width:34px;height:34px;border-radius:6px;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
</style>
</head>
<body>
<div id="toast-area"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
// ─── No React.StrictMode (prevents double-render flicker) ───────────────────
const {useState,useEffect,useRef,useCallback,useMemo,memo}=React;

// ─── Storage ────────────────────────────────────────────────────────────────
const DB={
  get:(k,fb)=>{try{const v=localStorage.getItem('kro2_'+k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem('kro2_'+k,JSON.stringify(v));}catch{}},
};

// ─── Toast (imperative, no re-render) ───────────────────────────────────────
let _tid=0;
function toast(title,body='',icon='·'){
  const c=document.getElementById('toast-area');if(!c)return;
  const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<div class="toast-icon">${icon}</div><div><div class="toast-t">${title}</div>${body?`<div class="toast-b">${body}</div>`:''}</div>`;
  c.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function notif(title,body){
  if(Notification.permission==='granted')new Notification('KRONOS · '+title,{body});
  toast(title,body,'○');
}

// ─── Audio ──────────────────────────────────────────────────────────────────
let _actx=null,_nodes=[];
function audio(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function stopAudio(){_nodes.forEach(n=>{try{n.stop();}catch{}});_nodes=[];}
function alarm(){
  const c=audio();if(c.state==='suspended')c.resume();
  [523,659,784,1047].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+i*.15;
    o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.35);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.35);
  });
}
function playSound(type){
  stopAudio();if(!type)return;
  const c=audio();if(c.state==='suspended')c.resume();
  const buf=c.createBuffer(1,c.sampleRate*4,c.sampleRate);
  const d=buf.getChannelData(0);
  if(type==='rain'){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(let i=0;i<d.length;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555;b1=.99332*b1+w*.0751;b2=.969*b2+w*.154;b3=.865*b3+w*.311;b4=.55*b4+w*.533;b5=-.7616*b5-w*.017;d[i]=(b0+b1+b2+b3+b4+b5)*0.1;}
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=2200;
    const g=c.createGain();g.gain.value=.55;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();_nodes.push(s);
  }else if(type==='ocean'){
    for(let i=0;i<d.length;i++){const wave=Math.sin(i/c.sampleRate*.12)*.5+.5;d[i]=(Math.random()*2-1)*wave*.25;}
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=700;
    const g=c.createGain();g.gain.value=.7;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();_nodes.push(s);
  }else if(type==='fire'){
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.random()*.35;
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=1000;
    const g=c.createGain();g.gain.value=.5;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();_nodes.push(s);
  }else if(type==='cafe'){
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=380;f.Q.value=.4;
    const g=c.createGain();g.gain.value=.2;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();_nodes.push(s);
  }else if(type==='forest'){
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.04;
    const s=c.createBufferSource();s.buffer=buf;s.loop=true;
    const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=3000;
    const g=c.createGain();g.gain.value=.4;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();_nodes.push(s);
  }
}

// ─── XP ─────────────────────────────────────────────────────────────────────
const RANKS=[
  {min:0,label:'I',color:'#555'},
  {min:500,label:'II',color:'#666'},
  {min:1500,label:'III',color:'#808080'},
  {min:3500,label:'IV',color:'#a0a0a0'},
  {min:7500,label:'V',color:'#c0c0c0'},
  {min:15000,label:'VI',color:'#f0f0f0'},
];
function getRank(xp){let r=RANKS[0];for(const x of RANKS)if(xp>=x.min)r=x;return r;}

// ─── Defaults ────────────────────────────────────────────────────────────────
const EMPTY_TASKS=[
  {id:1,text:'Revisar propuesta del cliente',energy:'alta',quad:0,done:false,cat:'trabajo',time:'09:00'},
  {id:2,text:'Planificar objetivos de la semana',energy:'alta',quad:1,done:false,cat:'trabajo',time:'10:00'},
  {id:3,text:'Leer 20 minutos',energy:'baja',quad:1,done:false,cat:'personal',time:'21:00'},
];
const EMPTY_HABITS=[

function Splash({onDone}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const letters=el.querySelectorAll('.splash-l');
    const line=el.querySelector('.splash-line');
    const sub=el.querySelector('.splash-sub');
    let t=[];
    letters.forEach((l,i)=>{t.push(setTimeout(()=>{l.style.opacity='1';l.style.transform='translateY(0)';l.style.transition=`opacity .4s ease ${i*.06}s, transform .4s ease ${i*.06}s`;l.style.transform='none';},100));});
    t.push(setTimeout(()=>{if(line)line.style.width='80px';},700));
    t.push(setTimeout(()=>{if(sub){sub.style.opacity='1';sub.style.transition='opacity .4s ease';}},1100));
    t.push(setTimeout(()=>{if(el){el.style.opacity='0';el.style.transition='opacity .4s ease';}},2400));
    t.push(setTimeout(()=>onDone(),2800));
    return()=>t.forEach(clearTimeout);
  },[]);
  return(
    <div ref={ref} className="splash">
      <div className="splash-word">
        {'KRONOS'.split('').map((l,i)=>(<span key={i} className="splash-l" style={{transform:'translateY(-20px)'}}>{l}</span>))}
      </div>
      <div className="splash-line"/>
      <div className="splash-sub">Sistema de gestión personal</div>
    </div>
  );
}

// ─── Focus timer hook — uses Date.now() so tab switching never pauses it ────
function useFocus(){
  const [time,setTime]=useState(25*60);
  const [running,setRunning]=useState(false);
  const [phase,setPhase]=useState('work');
  const [sessions,setSessions]=useState(0);
  // Store mutable state in ref to avoid stale closures
  const R=useRef({dur:25*60,remaining:25*60,startedAt:null,phase:'work',sessions:0});

  useEffect(()=>{
    if(!running)return;
    // Mark when this run started and how much was remaining
    R.current.startedAt=Date.now();
    const iv=setInterval(()=>{
      const elapsed=Math.floor((Date.now()-R.current.startedAt)/1000);
      const left=R.current.remaining-elapsed;
      if(left<=0){
        clearInterval(iv);
        alarm();
        if(R.current.phase==='work'){
          const s=R.current.sessions+1;
          R.current.sessions=s;setSessions(s);
          const brk=s%4===0?15*60:5*60;
          R.current.remaining=brk;R.current.dur=brk;R.current.phase='break';R.current.startedAt=null;
          setTime(brk);setPhase('break');setRunning(false);
          notif('Sesión completada','Tómate un descanso. Lo mereciste.');
          toast('Sesión completada',`${s} sesión(es). Descanso: ${s%4===0?'15':'5'} min`,'✓');
        }else{
          R.current.remaining=25*60;R.current.dur=25*60;R.current.phase='work';R.current.startedAt=null;
          setTime(25*60);setPhase('work');setRunning(false);
          toast('Descanso terminado','Nueva sesión lista.');
        }
      }else{
        setTime(left);
      }
    },500);// 500ms tick for accuracy
    return()=>{
      // Save remaining when stopped/unmounted so it can resume
      if(R.current.startedAt){
        const elapsed=Math.floor((Date.now()-R.current.startedAt)/1000);
        R.current.remaining=Math.max(0,R.current.remaining-elapsed);
        R.current.startedAt=null;
      }
      clearInterval(iv);
    };
  },[running]);

  // Handle tab visibility — when coming back, recalc elapsed accurately
  useEffect(()=>{
    const onVisible=()=>{
      if(!running||!R.current.startedAt)return;
      const elapsed=Math.floor((Date.now()-R.current.startedAt)/1000);
      const left=Math.max(0,R.current.remaining-elapsed);
      setTime(left);
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[running]);

  const toggle=useCallback(()=>{
    if(_actx&&_actx.state==='suspended')_actx.resume();
    setRunning(r=>{
      if(!r){
        // Starting — reset startedAt so elapsed calc is fresh
        R.current.startedAt=Date.now();
      }else{
        // Pausing — save remaining
        if(R.current.startedAt){
          const elapsed=Math.floor((Date.now()-R.current.startedAt)/1000);
          R.current.remaining=Math.max(0,R.current.remaining-elapsed);
          R.current.startedAt=null;
          setTime(R.current.remaining);
        }
      }
      return !r;
    });
  },[]);

  const reset=useCallback(()=>{
    R.current={dur:25*60,remaining:25*60,startedAt:null,phase:'work',sessions:R.current.sessions};
    setTime(25*60);setPhase('work');setRunning(false);
  },[]);

  const setDur=useCallback(sec=>{
    R.current={dur:sec,remaining:sec,startedAt:null,phase:'work',sessions:R.current.sessions};
    setTime(sec);setPhase('work');setRunning(false);
  },[]);

  return{time,running,phase,sessions,toggle,reset,setDur};
}

// ─── Streak calc ─────────────────────────────────────────────────────────────
function calcStreak(history){
  const today=new Date();let s=0;
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if((history||[]).includes(d.toISOString().slice(0,10)))s++;else break;
  }
  return s;
}

            <button className="btn btn-ghost btn-sm" onClick={()=>setQcOpen(true)} title="Captura rápida (⌘K)"
              style={{letterSpacing:'.08em',gap:6,display:'flex',alignItems:'center'}}>
              <span style={{fontSize:11}}>○</span> Captura rápida
              <span style={{fontSize:9,color:'var(--g3)',marginLeft:2,fontFamily:'monospace'}}>⌘K</span>
            </button>
            <select className="lang-select" value={lang} onChange={e=>{setLang(e.target.value);DB.set('lang',e.target.value);}}>
              <option value="es">ES</option>
              <option value="en">EN</option>
            </select>
            <div className="xp-pill">{xp} XP · {rank.label}</div>
            <button className="top-btn" title="Notificaciones" onClick={()=>{if(!notifOk)requestNotif();else toast('Notificaciones','Ya están activas.');}} style={{position:'relative'}}>
              ◻{!notifOk&&<span style={{position:'absolute',top:5,right:5,width:5,height:5,background:'var(--text)',borderRadius:'50%'}}/>}
            </button>
            <div className="time-display">{now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
            <div className="user-chip" onClick={()=>{DB.set('session',null);setUser(null);}}>
              <div className="avatar">{user.name[0].toUpperCase()}</div>

            <div style={{width:'100%',maxWidth:520,background:'var(--s1)',border:'1px solid var(--b2)',borderRadius:8,overflow:'hidden',boxShadow:'0 24px 64px rgba(0,0,0,.9)'}}>
              <div style={{display:'flex',alignItems:'center',padding:'14px 16px',gap:12,borderBottom:'1px solid var(--b1)'}}>
                <span style={{color:'var(--g2)',fontSize:13}}>○</span>
                <input ref={qcRef} value={qcVal} onChange={e=>setQcVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')qcSubmit();if(e.key==='Escape')setQcOpen(false);}}
                  placeholder="Captura una tarea rápida…"
                  style={{flex:1,background:'none',border:'none',outline:'none',fontSize:14,color:'var(--text)',fontFamily:'DM Sans,sans-serif'}}/>
                <span style={{fontSize:10,color:'var(--g3)',letterSpacing:'.06em'}}>↵ para agregar</span>
              </div>
              <div style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:10,color:'var(--g3)',letterSpacing:'.08em',textTransform:'uppercase'}}>Atajo</span>
                <span style={{background:'var(--s3)',border:'1px solid var(--b1)',borderRadius:3,padding:'1px 6px',fontSize:10,color:'var(--g2)',fontFamily:'monospace'}}>⌘K</span>
                <span style={{fontSize:10,color:'var(--g3)'}}>·</span>
                <span style={{fontSize:10,color:'var(--g3)'}}>Se agrega a Tareas → Hacer ya o Planificar</span>
              </div>
            </div>
          </div>
        )}

        {/* Content */}
        <div id="content">
          {tab==='dashboard'&&<DashTab tasks={tasks} habits={habits} pending={pending} reminders={reminders} xp={xp} rank={rank} doneT={doneT} doneH={doneH} tk={tk} setTab={setTab} user={user} setTasks={setTasks} setHabits={setHabits} addXP={addXP}/>}
          {tab==='tasks'&&<TasksTab tasks={tasks} setTasks={setTasks} addXP={addXP}/>}
          {tab==='habits'&&<HabitsTab habits={habits} setHabits={setHabits} tk={tk} addXP={addXP}/>}
          {tab==='goals'&&<GoalsTab goals={goals} setGoals={setGoals} addXP={addXP}/>}
          {tab==='projects'&&<ProjectsTab projects={projects} setProjects={setProjects}/>}
          {tab==='focus'&&<FocusTab focus={focus} sound={sound} setSound={setSound}/>}
          {tab==='finance'&&<FinanceTab finance={finance} setFinance={setFinance} addXP={addXP}/>}
          {tab==='calendar'&&<CalendarTab tasks={tasks} habits={habits} reminders={reminders} setTab={setTab}/>}
          {tab==='pending'&&<PendingTab pending={pending} setPending={setPending} addXP={addXP}/>}
          {tab==='reminders'&&<RemindersTab reminders={reminders} setReminders={setReminders} notifOk={notifOk} requestNotif={requestNotif}/>}
          {tab==='achievements'&&<AchievementsTab tasks={tasks} habits={habits} goals={goals} xp={xp} focus={focus}/>}
          {tab==='analysis'&&<AnalysisTab tasks={tasks} habits={habits} xp={xp} rank={rank} doneT={doneT} doneH={doneH}/>}
          {tab==='books'&&<BooksTab books={books} setBooks={setBooks}/>}
        </div>
      </div>
    </div>
  );
}

// ─── Tour Overlay ─────────────────────────────────────────────────────────────
function TourOverlay({step,stepIdx,total,onNav,onSkip}){
  const [pos,setPos]=useState({top:0,left:0,width:0,height:0});
  const cardRef=useRef(null);

  useEffect(()=>{
    if(!step.target){setPos(null);return;}
    const el=document.querySelector(step.target);
    if(!el){setPos(null);return;}
    const r=el.getBoundingClientRect();
    setPos({top:r.top-6,left:r.left-6,width:r.width+12,height:r.height+12});
  },[step]);

  // Card position
  const cardStyle=useMemo(()=>{
    if(!pos||step.pos==='center')return{top:'50%',left:'50%',transform:'translate(-50%,-50%)'};
    if(step.pos==='right')return{top:Math.min(pos.top,window.innerHeight-300),left:pos.left+pos.width+16};
    if(step.pos==='bottom')return{top:pos.top+pos.height+12,left:Math.max(8,pos.left)};
    return{top:'50%',left:'50%',transform:'translate(-50%,-50%)'};
  },[pos,step.pos]);

  return(
    <>
      {/* Dim overlay */}
      <div style={{position:'fixed',inset:0,zIndex:900,background:'rgba(0,0,0,.65)',pointerEvents:'all'}} onClick={()=>onNav(1)}/>
      {/* Spotlight cutout */}
      {pos&&<div className="tour-spotlight" style={{top:pos.top,left:pos.left,width:pos.width,height:pos.height}}/>}
      {/* Card */}
      <div ref={cardRef} className="tour-card" style={{...cardStyle,pointerEvents:'all'}}>
        {/* Progress bar */}
        <div style={{height:2,background:'var(--b1)',borderRadius:'8px 8px 0 0',overflow:'hidden'}}>
          <div style={{height:'100%',background:'var(--text)',width:`${((stepIdx+1)/total)*100}%`,transition:'width .3s ease',borderRadius:'8px 8px 0 0'}}/>
        </div>
        <div style={{padding:'18px 18px 14px'}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--g2)',marginBottom:8}}>{stepIdx+1} / {total}</div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8,lineHeight:1.3}}>{step.title}</div>
          <div style={{fontSize:12,color:'var(--g1)',lineHeight:1.7,marginBottom:18}}>{step.body}</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {stepIdx>0&&<button className="btn btn-ghost btn-sm" onClick={()=>onNav(-1)} style={{fontSize:10}}>← Atrás</button>}
            <button className="btn btn-red btn-sm" onClick={()=>onNav(1)} style={{flex:1,textAlign:'center'}}>
              {stepIdx===total-1?'¡Empezar!':'Siguiente →'}
            </button>
            <button onClick={onSkip} style={{background:'none',border:'none',fontSize:10,color:'var(--g3)',cursor:'pointer',padding:'4px',letterSpacing:'.06em',textTransform:'uppercase'}}>Saltar</button>
          </div>
        </div>
        {/* Step dots */}
        <div style={{display:'flex',gap:4,justifyContent:'center',padding:'0 18px 14px'}}>
          {Array.from({length:total}).map((_,i)=><div key={i} className={`tour-step-dot${i===stepIdx?' on':''}`}/>)}
        </div>
      </div>
    </>
  );
}

// ─── Finance ──────────────────────────────────────────────────────────────────
const FinanceTab=memo(({finance,setFinance,addXP})=>{
  const {savings=[],investments=[],expenses=[],savingsGoal=0,monthlyBudget=0}=finance;
  const [activeSection,setActiveSection]=useState('overview');
  const [modal,setModal]=useState(null);// 'saving'|'investment'|'expense'|'settings'
  const [form,setForm]=useState({});

  const fmt$=(n)=>'$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

  const totalSaved=savings.reduce((s,x)=>s+(x.amount||0),0);
  const totalInvested=investments.reduce((s,x)=>s+(x.amount||0),0);
  const totalExpenses=expenses.filter(e=>{
    const now=new Date();
    const d=new Date(e.date);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).reduce((s,e)=>s+(e.amount||0),0);
  const netWorth=totalSaved+totalInvested;

  const savingsPct=savingsGoal>0?Math.min(100,Math.round(totalSaved/savingsGoal*100)):0;
  const budgetPct=monthlyBudget>0?Math.min(100,Math.round(totalExpenses/monthlyBudget*100)):0;

  const EXPENSE_CATS=['Alimentación','Transporte','Entretenimiento','Salud','Educación','Hogar','Ropa','Servicios','Otros'];

  const openModal=(type,defaults={})=>{setModal(type);setForm(defaults);};

  const addSaving=()=>{
    if(!form.amount||isNaN(form.amount))return;
    setFinance(f=>({...f,savings:[...f.savings,{id:Date.now(),amount:parseFloat(form.amount),note:form.note||'',date:new Date().toISOString().slice(0,10)}]}));
    addXP(10,'Ahorro registrado');setModal(null);
  };
  const addInvestment=()=>{
    if(!form.amount||!form.name)return;
    setFinance(f=>({...f,investments:[...f.investments,{id:Date.now(),name:form.name,amount:parseFloat(form.amount),type:form.type||'acciones',return:parseFloat(form.return||0),date:new Date().toISOString().slice(0,10)}]}));
    addXP(15,'Inversión registrada');setModal(null);
  };
  const addExpense=()=>{
    if(!form.amount||!form.cat)return;
    setFinance(f=>({...f,expenses:[...f.expenses,{id:Date.now(),amount:parseFloat(form.amount),cat:form.cat,note:form.note||'',date:new Date().toISOString().slice(0,10)}]}));
    setModal(null);
  };

  const SECTIONS=[
    {id:'overview',label:'Resumen'},
    {id:'savings',label:'Ahorros'},
    {id:'investments',label:'Inversiones'},
    {id:'expenses',label:'Gastos'},
  ];

  // Group expenses by category for chart
  const expBycat=useMemo(()=>{
    const m={};
    expenses.forEach(e=>{if(!m[e.cat])m[e.cat]=0;m[e.cat]+=e.amount||0;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[expenses]);

  const investReturn=investments.reduce((s,i)=>s+(i.amount||0)*(i.return||0)/100,0);

  return(
    <div className="fade-in">
      {/* Modals */}
      {modal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}
          onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="card fade-in" style={{width:'100%',maxWidth:380,border:'1px solid var(--b2)'}}>
            {modal==='saving'&&<>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:18}}>Registrar ahorro</div>
              <div style={{marginBottom:12}}><div className="inp-label">Monto ($)</div><input className="inp" type="number" min="0" placeholder="0.00" value={form.amount||''} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
              <div style={{marginBottom:18}}><div className="inp-label">Nota (opcional)</div><input className="inp" placeholder="Ej. Quincena, bono…" value={form.note||''} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
              <div style={{display:'flex',gap:8}}><button className="btn btn-red" onClick={addSaving} disabled={!form.amount} style={{flex:1}}>Guardar</button><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button></div>
            </>}
            {modal==='investment'&&<>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:18}}>Nueva inversión</div>
              <div style={{marginBottom:12}}><div className="inp-label">Nombre</div><input className="inp" placeholder="Ej. S&P 500, Bitcoin, CETES…" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="grid-2" style={{marginBottom:12}}>
                <div><div className="inp-label">Monto ($)</div><input className="inp" type="number" min="0" placeholder="0.00" value={form.amount||''} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
                <div><div className="inp-label">Retorno anual (%)</div><input className="inp" type="number" placeholder="8" value={form.return||''} onChange={e=>setForm(f=>({...f,return:e.target.value}))}/></div>
              </div>
              <div style={{marginBottom:18}}><div className="inp-label">Tipo</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {['acciones','etf','cripto','cetes','inmueble','otro'].map(t=>(<button key={t} onClick={()=>setForm(f=>({...f,type:t}))} className="btn btn-sm" style={{background:form.type===t?'var(--s3)':'transparent',color:form.type===t?'var(--text)':'var(--g2)',border:`1px solid ${form.type===t?'var(--b2)':'var(--b1)'}`,textTransform:'capitalize'}}>{t}</button>))}
                </div>
              </div>
              <div style={{display:'flex',gap:8}}><button className="btn btn-red" onClick={addInvestment} disabled={!form.amount||!form.name} style={{flex:1}}>Guardar</button><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button></div>
            </>}
            {modal==='expense'&&<>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:18}}>Registrar gasto</div>
              <div style={{marginBottom:12}}><div className="inp-label">Monto ($)</div><input className="inp" type="number" min="0" placeholder="0.00" value={form.amount||''} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
              <div style={{marginBottom:12}}><div className="inp-label">Categoría</div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {EXPENSE_CATS.map(c=>(<button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} className="btn btn-sm" style={{background:form.cat===c?'var(--s3)':'transparent',color:form.cat===c?'var(--text)':'var(--g2)',border:`1px solid ${form.cat===c?'var(--b2)':'var(--b1)'}`}}>{c}</button>))}
                </div>
              </div>
              <div style={{marginBottom:18}}><div className="inp-label">Nota (opcional)</div><input className="inp" placeholder="Descripción del gasto" value={form.note||''} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
              <div style={{display:'flex',gap:8}}><button className="btn btn-red" onClick={addExpense} disabled={!form.amount||!form.cat} style={{flex:1}}>Guardar</button><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button></div>
            </>}
            {modal==='settings'&&<>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:18}}>Configuración financiera</div>
              <div style={{marginBottom:12}}><div className="inp-label">Meta de ahorro total ($)</div><input className="inp" type="number" min="0" placeholder="0.00" value={form.goal||savingsGoal||''} onChange={e=>setForm(f=>({...f,goal:e.target.value}))}/></div>
              <div style={{marginBottom:18}}><div className="inp-label">Presupuesto mensual ($)</div><input className="inp" type="number" min="0" placeholder="0.00" value={form.budget||monthlyBudget||''} onChange={e=>setForm(f=>({...f,budget:e.target.value}))}/></div>
              <div style={{display:'flex',gap:8}}><button className="btn btn-red" onClick={()=>{setFinance(f=>({...f,savingsGoal:parseFloat(form.goal||0),monthlyBudget:parseFloat(form.budget||0)}));setModal(null);}} style={{flex:1}}>Guardar</button><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button></div>
            </>}
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:2}}>Finanzas</div>
          <div style={{fontSize:11,color:'var(--g1)'}}>Patrimonio neto: <span style={{fontWeight:700,color:'var(--text)'}}>{fmt$(netWorth)}</span></div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>openModal('settings')}>⚙ Configurar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>openModal('expense')}>− Gasto</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>openModal('investment')}>↑ Inversión</button>
          <button className="btn btn-red btn-sm" onClick={()=>openModal('saving')}>+ Ahorro</button>
        </div>
      </div>

      {/* Section tabs */}
      <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'1px solid var(--b1)'}}>
        {SECTIONS.map(s=>(<button key={s.id} onClick={()=>setActiveSection(s.id)}
          style={{background:'none',border:'none',borderBottom:`2px solid ${activeSection===s.id?'var(--text)':'transparent'}`,
            padding:'8px 16px',fontSize:11,fontWeight:600,color:activeSection===s.id?'var(--text)':'var(--g2)',
            letterSpacing:'.08em',textTransform:'uppercase',cursor:'pointer',marginBottom:-1,transition:'all .14s'}}>{s.label}</button>))}
      </div>

      {/* Overview */}
      {activeSection==='overview'&&(
        <div>
          <div className="grid-4" style={{marginBottom:14}}>
            {[
              {lbl:'Total ahorrado',val:fmt$(totalSaved)},
              {lbl:'Total invertido',val:fmt$(totalInvested)},
              {lbl:'Retorno estimado/año',val:fmt$(investReturn)},
              {lbl:'Gastos este mes',val:fmt$(totalExpenses)},
            ].map(k=>(<div key={k.lbl} className="fin-kpi"><div className="fin-kpi-val">{k.val}</div><div className="fin-kpi-lbl">{k.lbl}</div></div>))}
          </div>

          {savingsGoal>0&&<div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <div className="section-label" style={{marginBottom:0}}>Meta de ahorro</div>
              <div style={{fontSize:12,fontWeight:700}}>{savingsPct}% — {fmt$(totalSaved)} / {fmt$(savingsGoal)}</div>
            </div>
            <ProgBar pct={savingsPct} color='var(--text)' height={3}/>
          </div>}

          {monthlyBudget>0&&<div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <div className="section-label" style={{marginBottom:0}}>Presupuesto mensual</div>
              <div style={{fontSize:12,fontWeight:700,color:budgetPct>90?'var(--g1)':'var(--text)'}}>{budgetPct}% — {fmt$(totalExpenses)} / {fmt$(monthlyBudget)}</div>
            </div>
            <ProgBar pct={budgetPct} color={budgetPct>90?'var(--g1)':'var(--text)'} height={3}/>
            {budgetPct>90&&<div style={{fontSize:11,color:'var(--g1)',marginTop:8}}>Atención: has consumido más del 90% del presupuesto mensual.</div>}
          </div>}

          {expBycat.length>0&&<div className="card">
            <div className="section-label">Gastos por categoría</div>
            {expBycat.map(([cat,total])=>(
              <div key={cat} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--b1)'}}>
                <div style={{width:80,fontSize:12,color:'var(--g1)'}}>{cat}</div>
                <div style={{flex:1}}><ProgBar pct={expBycat[0][1]>0?total/expBycat[0][1]*100:0} color='var(--text)' height={1}/></div>
                <div style={{fontSize:12,fontWeight:600,width:80,textAlign:'right'}}>{fmt$(total)}</div>
              </div>
            ))}
          </div>}
        </div>
      )}

      {/* Savings */}
      {activeSection==='savings'&&(
        <div>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div className="section-label" style={{marginBottom:0}}>Historial de ahorros</div>
              <button className="btn btn-red btn-sm" onClick={()=>openModal('saving')}>+ Agregar</button>
            </div>
            {savings.length===0&&<div style={{color:'var(--g2)',fontSize:12,padding:'20px 0',textAlign:'center'}}>Sin ahorros registrados aún.</div>}
            {[...savings].reverse().map(s=>(
              <div key={s.id} className="txn-row">
                <div className="txn-icon">↑</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{fmt$(s.amount)}</div>
                  <div style={{fontSize:10,color:'var(--g2)',marginTop:2}}>{s.date}{s.note&&' · '+s.note}</div>
                </div>
                <button onClick={()=>setFinance(f=>({...f,savings:f.savings.filter(x=>x.id!==s.id)}))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
            {savings.length>0&&<div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--b1)',display:'flex',justifyContent:'space-between',fontSize:13}}>
              <span style={{color:'var(--g1)'}}>Total acumulado</span>
              <span style={{fontWeight:700}}>{fmt$(totalSaved)}</span>
            </div>}
          </div>
        </div>
      )}

      {/* Investments */}
      {activeSection==='investments'&&(
        <div>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div className="section-label" style={{marginBottom:0}}>Portafolio de inversiones</div>
              <button className="btn btn-red btn-sm" onClick={()=>openModal('investment')}>+ Agregar</button>
            </div>
            {investments.length===0&&<div style={{color:'var(--g2)',fontSize:12,padding:'20px 0',textAlign:'center'}}>Sin inversiones registradas aún.</div>}
            {investments.map(inv=>{
              const annualReturn=(inv.amount||0)*(inv.return||0)/100;
              return(
                <div key={inv.id} className="txn-row">
                  <div className="txn-icon" style={{fontSize:11,fontWeight:700,color:'var(--g1)',textTransform:'uppercase'}}>{(inv.type||'').slice(0,3)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{inv.name}</div>
                    <div style={{fontSize:10,color:'var(--g2)'}}>{inv.date} · {inv.return||0}% retorno anual</div>
                  </div>

              </div>

          })}

      </div>

      {/* Alerts */}
      {(pending.filter(p=>!p.done).length>0||reminders.filter(r=>!r.done&&r.datetime&&new Date(r.datetime)>new Date()).length>0)&&(
        <div className="grid-2" style={{marginTop:14}}>
          {pending.filter(p=>!p.done).length>0&&(
            <div className="card" style={{borderColor:'var(--g1)',cursor:'pointer'}} onClick={()=>setTab('pending')}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:20,color:'var(--g1)'}}>△</span>
                <div><div style={{fontWeight:600,fontSize:14}}>{pending.filter(p=>!p.done).length} pendiente(s)</div><div style={{fontSize:11,color:'var(--g1)'}}>Requieren atención</div></div>
              </div>
            </div>
          )}
          {reminders.filter(r=>!r.done&&r.datetime&&new Date(r.datetime)>new Date()).length>0&&(
            <div className="card" style={{borderColor:'var(--g1)',cursor:'pointer'}} onClick={()=>setTab('reminders')}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:20,color:'var(--g1)'}}>◻</span>
                <div><div style={{fontWeight:600,fontSize:14}}>{reminders.filter(r=>!r.done&&r.datetime&&new Date(r.datetime)>new Date()).length} recordatorio(s)</div><div style={{fontSize:11,color:'var(--g1)'}}>Próximos</div></div>
              </div>
            </div>
          )}
        </div>

});

const QUAD_CONFIG=[
  {id:0,label:'Urgente · Importante',short:'Hacer ya',color:'var(--text)',bg:'rgba(240,240,240,.06)',border:'rgba(240,240,240,.2)',desc:'Crisis, deadlines, emergencias'},

const QuadBadge=({quad})=>{
  const q=QUAD_CONFIG[quad]||QUAD_CONFIG[0];
  return <span className="quad-badge" style={{background:q.bg,color:q.color,border:`1px solid ${q.border}`}}>{q.short}</span>;

const TasksTab=memo(({tasks,setTasks,addXP})=>{
  const [input,setInput]=useState('');
  const [cat,setCat]=useState('trabajo');
  const [quad,setQuad]=useState(0);
  const [filter,setFilter]=useState('todas');
  const [showForm,setShowForm]=useState(false);
  const [recur,setRecur]=useState('ninguna');

  const add=()=>{
    if(!input.trim())return;
    // Local parsing: extract time pattern, energy keywords
    const timeMatch=input.match(/\b(\d{1,2})[:\.](\d{2})\b|\b(\d{1,2})(am|pm)\b/i);
    let time='09:00';
    if(timeMatch){
      if(timeMatch[4]){let h=parseInt(timeMatch[3]);if(timeMatch[4].toLowerCase()==='pm'&&h<12)h+=12;time=`${String(h).padStart(2,'0')}:00`;}
      else time=`${String(timeMatch[1]).padStart(2,'0')}:${timeMatch[2]}`;
    }
    const low=/descanso|leer|revisar|email|correo|llamar|reunión/i.test(input);
    const high=/urgente|importante|crítico|entrega|deadline|presentación/i.test(input);
    const energy=high?'alta':low?'baja':'media';
    const text=input.replace(/\b\d{1,2}[:.]\d{2}\b|\b\d{1,2}(am|pm)\b/gi,'').replace(/\s+/g,' ').trim();
    setTasks(ts=>[...ts,{id:Date.now(),text:text||input,energy,time,cat,quad,done:false,recur}]);
    setInput('');setShowForm(false);setRecur('ninguna');
    toast('Tarea agregada','Clasificada en: '+QUAD_CONFIG[quad].short,'·');
  };

  const filtered=filter==='todas'?tasks:tasks.filter(t=>t.cat===filter);
  return(
    <div className="fade-in">
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3,letterSpacing:'-.01em'}}>Matriz de Eisenhower</div>
          <div style={{fontSize:11,color:'var(--g1)'}}>{tasks.filter(t=>!t.done).length} tarea(s) pendiente(s)</div>
        </div>
        <button className="btn btn-red" onClick={()=>setShowForm(v=>!v)}>{showForm?'✕ Cancelar':'+ Nueva tarea'}</button>
      </div>

      {/* Add form */}
      {showForm&&(
        <div className="card fade-in" style={{marginBottom:18,border:'1px solid var(--b2)'}}>
          <div className="section-label">Nueva tarea</div>

          {/* Text input */}
          <div style={{marginBottom:14}}>
            <div className="inp-label">Descripción</div>
            <div style={{display:'flex',gap:10}}>
              <input className="inp" value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&add()}
                placeholder="Describe la tarea en lenguaje natural..." style={{flex:1}}/>
            </div>
          </div>

          {/* Quad picker — the key feature */}
          <div style={{marginBottom:14}}>
            <div className="inp-label">Cuadrante Eisenhower</div>
            <QuadPicker value={quad} onChange={setQuad}/>
          </div>

          {/* Category */}
          <div style={{marginBottom:12}}>
            <div className="inp-label">Área</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {AREAS.map(a=>(<button key={a} onClick={()=>setCat(a)} className="btn btn-sm"
                style={{background:cat===a?'var(--s3)':'transparent',color:cat===a?'var(--text)':'var(--g2)',
                  border:`1px solid ${cat===a?'var(--b2)':'var(--b1)'}`,textTransform:'capitalize'}}>{a}</button>))}
            </div>
          </div>

          {/* Recurrence */}
          <div style={{marginBottom:16}}>
            <div className="inp-label">Repetición</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {['ninguna','diario','semanal','mensual'].map(r=>(<button key={r} onClick={()=>setRecur(r)} className="btn btn-sm"
                style={{background:recur===r?'var(--s3)':'transparent',color:recur===r?'var(--text)':'var(--g2)',
                  border:`1px solid ${recur===r?'var(--b2)':'var(--b1)'}`,textTransform:'capitalize'}}>{r==='ninguna'?'Sin repetición':r}</button>))}
            </div>
          </div>

          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-red" onClick={add} disabled={!input.trim()}
              style={{minWidth:110}}>Agregar tarea</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowForm(false)}>Cancelar</button>
            <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:QUAD_CONFIG[quad].color}}/>
              <span style={{fontSize:10,color:QUAD_CONFIG[quad].color,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase'}}>{QUAD_CONFIG[quad].short}</span>
            </div>
          </div>
        </div>
      )}

      {/* Filter */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
        {['todas',...AREAS].map(a=>(<button key={a} onClick={()=>setFilter(a)} className="btn btn-sm"
          style={{background:filter===a?'var(--s3)':'transparent',color:filter===a?'var(--text)':'var(--g2)',
            border:`1px solid ${filter===a?'var(--b2)':'var(--b1)'}`,textTransform:'capitalize'}}>{a}</button>))}
      </div>

      {/* Matrix 2x2 */}
      <div className="grid-2" style={{marginBottom:14}}>
        {QUAD_CONFIG.map(q=>(
          <div key={q.id} className="card" style={{borderColor:'var(--b1)',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:q.color}}/>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:q.color,flexShrink:0}}/>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:q.color}}>{q.short}</div>
                <div style={{fontSize:9,color:'var(--g2)',marginTop:1,letterSpacing:'.04em'}}>{q.label}</div>
              </div>
              <div style={{marginLeft:'auto',background:q.bg,border:`1px solid ${q.border}`,borderRadius:10,padding:'1px 8px',fontSize:10,color:q.color,fontWeight:700}}>
                {filtered.filter(t=>t.quad===q.id&&!t.done).length}
              </div>
            </div>
            {filtered.filter(t=>t.quad===q.id).map(t=>(
              <div key={t.id} style={{display:'flex',gap:8,marginBottom:8,opacity:t.done?.3:1,transition:'opacity .2s'}}>
                <Chk done={t.done} onClick={()=>{setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:!x.done}:x));if(!t.done)addXP(20,'Tarea completada');}}/>
                <div style={{flex:1,fontSize:12,textDecoration:t.done?'line-through':'none',lineHeight:1.5,paddingTop:1,color:t.done?'var(--g2)':'var(--text)'}}>{t.text}</div>
                <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',color:'var(--g3)',fontSize:14,lineHeight:1,cursor:'pointer',opacity:0,transition:'opacity .14s'}}
                  onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0}>×</button>
              </div>
            ))}
            {filtered.filter(t=>t.quad===q.id).length===0&&<div style={{fontSize:11,color:'var(--g3)',fontStyle:'italic',padding:'4px 0'}}>Sin tareas</div>}
          </div>
        ))}
      </div>

      {/* List */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,alignItems:'center'}}>
          <div className="section-label" style={{marginBottom:0}}>Lista completa</div>
          <div style={{fontSize:10,color:'var(--g2)',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase'}}>{filtered.length} tarea(s)</div>
        </div>
        {filtered.map((t,i)=>(
          <div key={t.id}>
            {i>0&&<div className="div" style={{margin:'0'}}/>}
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',opacity:t.done?.4:1}}>
              <Chk done={t.done} onClick={()=>{setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:!x.done}:x));if(!t.done)addXP(20,'Tarea completada');}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,textDecoration:t.done?'line-through':'none',marginBottom:3}}>{t.text}</div>
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:10,color:'var(--g2)'}}>{t.time} · {t.cat}</span>
                  <QuadBadge quad={t.quad}/>
                  {t.recur&&t.recur!=='ninguna'&&<span style={{fontSize:9,padding:'1px 6px',borderRadius:2,border:'1px solid var(--b2)',color:'var(--g2)',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.recur}</span>}
                </div>
              </div>
              <div style={{fontSize:9,padding:'2px 7px',borderRadius:3,background:'var(--s3)',color:'var(--g1)',textTransform:'uppercase',fontWeight:700,letterSpacing:'.06em'}}>{t.energy}</div>
              <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',color:'var(--g3)',fontSize:14,lineHeight:1,cursor:'pointer'}}>×</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div style={{color:'var(--g2)',fontSize:12,padding:'20px 0',textAlign:'center'}}>Sin tareas en esta área</div>}
      </div>
    </div>
  );
});

          <div className="section-label">Nuevo hábito</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {EMOJIS.map(e=>(<span key={e} onClick={()=>setNewH(h=>({...h,emoji:e}))} style={{fontSize:16,cursor:'pointer',padding:'4px 8px',borderRadius:6,background:newH.emoji===e?'var(--s3)':'transparent',border:`1px solid ${newH.emoji===e?'var(--b2)':'transparent'}`,color:newH.emoji===e?'var(--text)':'var(--g1)'}}>{e}</span>))}
          </div>
          <div style={{display:'flex',gap:10,marginBottom:10}}>
            <input className="inp" value={newH.name} onChange={e=>setNewH(h=>({...h,name:e.target.value}))} placeholder="Nombre del hábito" style={{flex:2}}/>
            <input className="inp" value={newH.time} onChange={e=>setNewH(h=>({...h,time:e.target.value}))} placeholder="Hora (opcional)" style={{flex:1}}/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-red btn-sm" disabled={!newH.name.trim()} onClick={()=>{setHabits(hs=>[...hs,{id:Date.now(),...newH,streak:0,history:[]}]);setNewH({name:'',emoji:'○',time:''});setShowAdd(false);toast('Hábito creado','Empieza hoy mismo.');}} >Guardar</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancelar</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {habits.map(h=>{
          const done=(h.history||[]).includes(tk);
          const last7=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return(h.history||[]).includes(d.toISOString().slice(0,10));}).reverse();
          return(
            <div key={h.id} className="card" style={{borderColor:done?'var(--g1)':'var(--b1)',transition:'border-color .2s'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <div style={{width:36,height:36,borderRadius:8,background:done?'var(--g1)11':'var(--s2)',border:`1px solid ${done?'var(--g1)':'var(--b1)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:done?'var(--g1)':'var(--g1)',transition:'all .2s'}}>{h.emoji}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{h.name}</div>
                    <div style={{fontSize:11}}><span style={{color:'var(--g1)',fontWeight:700}}>{h.streak}</span> <span style={{color:'var(--g2)'}}>días de racha</span></div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {!done?<button className="btn btn-ghost btn-sm" onClick={()=>{const hist=[...(h.history||[]),tk];const s=calcStreak(hist);setHabits(hs=>hs.map(x=>x.id===h.id?{...x,history:hist,streak:s}:x));addXP(15,'Hábito: '+h.name);}}>Hecho</button>:<span style={{fontSize:11,color:'var(--g1)',fontWeight:600}}>✓</span>}
                  <button onClick={()=>setHabits(hs=>hs.filter(x=>x.id!==h.id))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer',fontSize:14}}>×</button>
                </div>
              </div>
              {/* Week bars */}
              <div style={{display:'flex',gap:3,marginBottom:10}}>
                {['L','M','M','J','V','S','D'].map((d,i)=>(
                  <div key={i} style={{flex:1,textAlign:'center'}}>
                    <div style={{fontSize:8,color:'var(--g3)',marginBottom:3}}>{d}</div>
                    <div style={{height:16,borderRadius:3,background:last7[i]?'var(--text)':'var(--s3)'}}/>
                  </div>
                ))}
              </div>
              {/* 63-day heatmap */}
              <div className="hmap">
                {[...Array(63)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(62-i));const k=d.toISOString().slice(0,10);return(<div key={i} className={`hmap-cell${(h.history||[]).includes(k)?' done':''}`}/>);})}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
});

// ─── Goals ───────────────────────────────────────────────────────────────────
const GoalsTab=memo(({goals,setGoals,addXP})=>{
  const [showAdd,setShowAdd]=useState(false);
  const [ng,setNg]=useState({title:'',current:'0',target:'',unit:'',deadline:'',emoji:'◎',actions:[]});
  const [newA,setNewA]=useState('');
  const EMOJIS=['◎','◈','◉','△','○','◇','□','★','·'];

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div><div style={{fontSize:15,fontWeight:600,marginBottom:2}}>Objetivos</div><div style={{fontSize:11,color:'var(--g1)'}}>Seguimiento cuantitativo</div></div>
        <button className="btn btn-red" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕ Cancelar':'+ Nuevo'}</button>
      </div>

      {showAdd&&(
        <div className="card fade-in" style={{marginBottom:14}}>
          <div className="section-label">Nuevo objetivo</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {EMOJIS.map(e=>(<span key={e} onClick={()=>setNg(g=>({...g,emoji:e}))} style={{fontSize:16,cursor:'pointer',padding:'4px 8px',borderRadius:6,background:ng.emoji===e?'var(--s3)':'transparent',border:`1px solid ${ng.emoji===e?'var(--b2)':'transparent'}`,color:ng.emoji===e?'var(--text)':'var(--g1)'}}>{e}</span>))}
          </div>
          <input className="inp" value={ng.title} onChange={e=>setNg(g=>({...g,title:e.target.value}))} placeholder="Título del objetivo" style={{marginBottom:10}}/>
          <div className="grid-3" style={{marginBottom:10}}>
            <div><div className="inp-label">Progreso actual</div><input className="inp" type="number" value={ng.current} min="0" onChange={e=>setNg(g=>({...g,current:e.target.value}))}/></div>
            <div><div className="inp-label">Meta total</div><input className="inp" type="number" value={ng.target} min="1" onChange={e=>setNg(g=>({...g,target:e.target.value}))} placeholder="100"/></div>
            <div><div className="inp-label">Unidad</div><input className="inp" value={ng.unit} onChange={e=>setNg(g=>({...g,unit:e.target.value}))} placeholder="km, págs…"/></div>
          </div>
          <div style={{marginBottom:12}}><div className="inp-label">Fecha límite (opcional)</div><input className="inp" type="date" value={ng.deadline} onChange={e=>setNg(g=>({...g,deadline:e.target.value}))}/></div>
          <div style={{marginBottom:14}}>
            <div className="inp-label">Acciones / pasos</div>
            <div className="card-inner">
              {ng.actions.map((a,i)=>(<div key={i} style={{display:'flex',gap:8,padding:'5px 0',fontSize:12,borderBottom:i<ng.actions.length-1?'1px solid var(--b1)':'none',alignItems:'center'}}>
                <span style={{color:'var(--g2)'}}>·</span><span style={{flex:1}}>{a.text}</span>
                <button onClick={()=>setNg(g=>({...g,actions:g.actions.filter((_,j)=>j!==i)}))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer'}}>×</button>
              </div>))}
              <input className="inp" value={newA} onChange={e=>setNewA(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newA.trim()){setNg(g=>({...g,actions:[...g.actions,{id:Date.now(),text:newA,done:false}]}));setNewA('');}}} placeholder="Agrega un paso y presiona Enter" style={{marginTop:ng.actions.length?8:0,fontSize:12}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-red btn-sm" disabled={!ng.title.trim()||!ng.target} onClick={()=>{const t=parseFloat(ng.target),c=parseFloat(ng.current)||0;setGoals(gs=>[...gs,{id:Date.now(),title:ng.title,current:Math.min(c,t),target:t,unit:ng.unit||'unidades',deadline:ng.deadline||'',emoji:ng.emoji,actions:ng.actions}]);setNg({title:'',current:'0',target:'',unit:'',deadline:'',emoji:'◎',actions:[]});setShowAdd(false);toast('Objetivo creado','Definido y registrado.');}}>Crear objetivo</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="grid-2">
        {goals.map(g=>{
          const pct=Math.min(100,Math.round((g.current/g.target)*100));
          const raw=g.deadline?new Date(g.deadline):null;
          const days=raw&&!isNaN(raw)?Math.ceil((raw-new Date())/86400000):null;
          const doneA=g.actions?.filter(a=>a.done).length||0;
          return(
            <div key={g.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{display:'flex',gap:10,alignItems:'center',flex:1,paddingRight:12}}>
                  <span style={{fontSize:20,color:'var(--g1)'}}>{g.emoji}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:3}}>{g.title}</div>
                    {days!==null&&<div style={{fontSize:11,color:days<=3?'var(--text)':days<=7?'var(--g1)':'var(--g2)'}}>{days>0?days+' días restantes':days===0?'Vence hoy':'Plazo vencido'}</div>}
                  </div>
                </div>
                <div style={{textAlign:'right',display:'flex',alignItems:'flex-start',gap:8}}>
                  <div>
                    <div style={{fontSize:22,fontWeight:700,lineHeight:1,color:pct>=100?'var(--g1)':'var(--text)'}}>{pct}%</div>
                    <div style={{fontSize:10,color:'var(--g2)',marginTop:2}}>{g.current}/{g.target} {g.unit}</div>
                  </div>
                  <button onClick={()=>setGoals(gs=>gs.filter(x=>x.id!==g.id))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer',fontSize:14}}>×</button>
                </div>
              </div>
              <ProgBar pct={pct} color={pct>=100?'var(--g1)':'var(--text)'} height={4}/>
              {g.actions?.length>0&&(
                <div style={{marginTop:12}}>
                  <div style={{fontSize:10,color:'var(--g2)',marginBottom:6}}>Acciones: {doneA}/{g.actions.length}</div>
                  {g.actions.map(a=>(
                    <div key={a.id} onClick={()=>setGoals(gs=>gs.map(x=>x.id===g.id?{...x,actions:x.actions.map(t=>t.id===a.id?{...t,done:!t.done}:t)}:x))} style={{display:'flex',gap:8,padding:'5px 0',cursor:'pointer',borderTop:'1px solid var(--b1)',opacity:a.done?.4:1}}>
                      <Chk done={a.done}/>
                      <div style={{fontSize:12,textDecoration:a.done?'line-through':'none'}}>{a.text}</div>
                    </div>
                  ))}
                </div>
              )}
              <div style={{marginTop:12}}>
                <input placeholder={`Actualizar (${g.unit})…`} style={{width:'100%',background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontSize:12,outline:'none',fontFamily:'Inter'}}
                  onKeyDown={e=>{if(e.key==='Enter'){const n=parseFloat(e.target.value);if(!isNaN(n)){setGoals(gs=>gs.map(x=>x.id===g.id?{...x,current:Math.min(n,x.target)}:x));addXP(10,'Progreso registrado');e.target.value='';}}}}/>
              </div>
            </div>
          );
        })}
      </div>
      {goals.length===0&&!showAdd&&<div style={{textAlign:'center',padding:'48px',color:'var(--g2)'}}>Sin objetivos. Toca "+ Nuevo".</div>}
    </div>
  );
});

// ─── Projects (Kanban) ───────────────────────────────────────────────────────

  const [np,setNp]=useState({title:'',tag:'',col:'pending',steps:[]});
  const [ns,setNs]=useState('');

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

      {showAdd&&(

            <input className="inp" value={np.tag} onChange={e=>setNp(p=>({...p,tag:e.target.value}))} placeholder="Etiqueta (ej: Diseño)"/>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            {COLS.map(c=>(<button key={c.id} onClick={()=>setNp(p=>({...p,col:c.id}))} className="btn btn-sm" style={{background:np.col===c.id?'var(--s3)':'transparent',color:np.col===c.id?'var(--text)':'var(--g2)',border:`1px solid ${np.col===c.id?'var(--b2)':'var(--b1)'}`}}>{c.label}</button>))}
          </div>
          <div style={{marginBottom:12}}>
            <div className="inp-label">Pasos</div>
            <div className="card-inner">
              {np.steps.map((s,i)=>(<div key={i} style={{display:'flex',gap:8,padding:'5px 0',fontSize:12,borderBottom:i<np.steps.length-1?'1px solid var(--b1)':'none',alignItems:'center'}}><span style={{color:'var(--g2)'}}>·</span><span style={{flex:1}}>{s.t}</span><button onClick={()=>setNp(p=>({...p,steps:p.steps.filter((_,j)=>j!==i)}))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer'}}>×</button></div>))}
              <input className="inp" value={ns} onChange={e=>setNs(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&ns.trim()){setNp(p=>({...p,steps:[...p.steps,{id:Date.now(),t:ns,d:false}]}));setNs('');}}} placeholder="Agrega un paso y presiona Enter" style={{marginTop:np.steps.length?8:0,fontSize:12}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-red btn-sm" disabled={!np.title.trim()} onClick={()=>{setProjects(ps=>[...ps,{id:Date.now(),...np}]);setNp({title:'',tag:'',col:'pending',steps:[]});setShowAdd(false);}}>Crear</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancelar</button>
          </div>

                <div style={{display:'flex',alignItems:'center',gap:8}}>

                return(
                  <div key={p.id} className="board-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      {p.tag&&<div className="tag" style={{background:'var(--s3)',color:'var(--g1)'}}>{p.tag}</div>}
                      <button onClick={()=>setProjects(ps=>ps.filter(x=>x.id!==p.id))} style={{background:'none',border:'none',color:'var(--g3)',cursor:'pointer',marginLeft:'auto',fontSize:13}}>×</button>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>{p.title}</div>
                    {totS>0&&<>
                      <div style={{fontSize:11,color:'var(--g2)',marginBottom:5}}>{doneS}/{totS} pasos</div>

                      <div style={{marginTop:8}}>

                          <Chk done={s.d}/>

                      </div>
                    </>}

                      {COLS.filter(c=>c.id!==col.id).map(c=>(<button key={c.id} onClick={()=>setProjects(ps=>ps.map(x=>x.id===p.id?{...x,col:c.id}:x))} style={{flex:1,background:'none',border:`1px solid ${c.color}44`,borderRadius:5,padding:'5px 0',fontSize:10,color:c.color,cursor:'pointer',fontFamily:'Inter',letterSpacing:'.02em'}}>→ {c.label}</button>))}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
});

// ─── Focus ───────────────────────────────────────────────────────────────────
const FocusTab=memo(({focus,sound,setSound})=>{
  const {time,running,phase,sessions,toggle,reset,setDur}=focus;
  const total=phase==='work'?25*60:5*60;
  const pct=(1-(time/total))*100;
  const r=88;const circ=2*Math.PI*r;
  const dash=circ*pct/100;

  return(
    <div className="fade-in">
      <div className="grid-2">
        <div className="card" style={{textAlign:'center',padding:'32px 24px'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:phase==='work'?'var(--text)':'var(--g1)',marginBottom:24}}>{phase==='work'?'Sesión de trabajo':'Tiempo de descanso'}</div>
          <div style={{position:'relative',width:200,height:200,margin:'0 auto 24px'}}>
            <svg width="200" height="200" style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)'}}>
              <circle cx="100" cy="100" r={r} fill="none" stroke="var(--s3)" strokeWidth="8"/>
              <circle cx="100" cy="100" r={r} fill="none" stroke={phase==='work'?'var(--text)':'var(--g1)'} strokeWidth="8"
                strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .8s linear'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div className="focus-time" style={{color:running?'var(--text)':'var(--g1)',transition:'color .3s'}}>{fmt(time)}</div>
              <div style={{fontSize:11,color:'var(--g2)',marginTop:4,letterSpacing:'.06em'}}>{running?'EN CURSO':'EN ESPERA'}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:20}}>
            <button className="btn btn-red" onClick={toggle} style={{minWidth:100}}>{running?'Pausar':'Iniciar'}</button>
            <button className="btn btn-ghost" onClick={reset}>Reiniciar</button>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            {[[25*60,'25'],[45*60,'45'],[60*60,'60'],[90*60,'90']].map(([s,l])=>(
              <button key={l} onClick={()=>setDur(s)} className="btn btn-ghost btn-sm"
                style={{background:time===s&&!running?'var(--s3)':'transparent',color:time===s&&!running?'var(--text)':'var(--g2)',borderColor:time===s&&!running?'var(--b2)':'var(--b1)'}}>
                {l} min
              </button>
            ))}
          </div>
          {sessions>0&&<div style={{marginTop:18,fontSize:11,color:'var(--g2)'}}>Sesiones completadas hoy: {sessions}</div>}
        </div>

        <div className="card">
          <div className="section-label">Ambiente sonoro</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {SOUNDS.map(s=>(
              <div key={String(s.id)} onClick={()=>setSound(x=>x===s.id?null:s.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:8,cursor:'pointer',background:sound===s.id?'var(--s2)':'transparent',border:`1px solid ${sound===s.id?'var(--b2)':'transparent'}`,transition:'all .15s'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:sound===s.id?'var(--text)':'var(--g3)',transition:'background .15s',flexShrink:0}}/>
                <div style={{fontSize:13,color:sound===s.id?'var(--text)':'var(--g1)'}}>{s.label}</div>
                {sound===s.id&&<div style={{marginLeft:'auto',fontSize:10,color:'var(--text)',letterSpacing:'.06em'}}>REPRODUCIENDO</div>}
              </div>
            ))}
          </div>

          <div className="div"/>
          <div className="section-label">Metodología Pomodoro</div>
          <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:12,color:'var(--g1)'}}>
            {[['1.','Selecciona una tarea específica'],['2.','Trabaja 25 min sin interrupciones'],['3.','Descansa 5 min'],['4.','Cada 4 sesiones, descanso de 15 min']].map(([n,t])=>(
              <div key={n} style={{display:'flex',gap:10}}><span style={{color:'var(--g3)',width:16,flexShrink:0}}>{n}</span><span>{t}</span></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
});

// ─── Pending ─────────────────────────────────────────────────────────────────

  const [showAdd,setShowAdd]=useState(false);
  const [np,setNp]=useState({text:'',deadline:''});
  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div><div style={{fontSize:15,fontWeight:600,marginBottom:2}}>Pendientes</div><div style={{fontSize:11,color:'var(--g1)'}}>{pending.filter(p=>!p.done).length} activo(s)</div></div>
        <button className="btn btn-red" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕':'+ Agregar'}</button>
      </div>
