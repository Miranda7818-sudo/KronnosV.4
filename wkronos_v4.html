// ─── Analysis ────────────────────────────────────────────────────────────────
const AnalysisTab=memo(({tasks,habits,xp,rank,doneT,doneH})=>{
  const hour=new Date().getHours();
  const [period,setPeriod]=useState(7);

  // Long-term habit data for chart
  const periodData=useMemo(()=>{
    const arr=[];
    for(let i=period-1;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      const doneH=habits.filter(h=>(h.history||[]).includes(k)).length;
      const pct=habits.length?Math.round(doneH/habits.length*100):0;
      arr.push({k,label:d.toLocaleDateString('es-ES',{day:'numeric',month:'short'}),pct,doneH});
    }
    return arr;
  },[habits,period]);

  const avgCompletion=periodData.length?Math.round(periodData.reduce((s,d)=>s+d.pct,0)/periodData.length):0;
  const bestDay=periodData.reduce((b,d)=>d.pct>b.pct?d:b,{pct:0,label:'—'});

  // Local rule-based coach — no AI needed
  const insights=useMemo(()=>{
    const tips=[];
    const taskRate=tasks.length?doneT/tasks.length:0;
    const habitRate=habits.length?doneH/habits.length:0;
    const pendingUrgent=tasks.filter(t=>!t.done&&t.quad===0).length;
    const pendingImportant=tasks.filter(t=>!t.done&&t.quad===1).length;
    const maxStreak=habits.length?Math.max(...habits.map(h=>h.streak||0)):0;

    if(pendingUrgent>0) tips.push({label:'Atención inmediata',text:`Tienes ${pendingUrgent} tarea(s) urgentes e importantes sin completar. Son tu prioridad absoluta ahora mismo.`});
    if(taskRate>=0.8) tips.push({label:'Alto rendimiento',text:`Completaste el ${Math.round(taskRate*100)}% de tus tareas. Rendimiento por encima del umbral de excelencia.`});
    else if(taskRate>0&&taskRate<0.5) tips.push({label:'Brecha de ejecución',text:`Solo el ${Math.round(taskRate*100)}% de tareas completadas. Evalúa si tienes demasiadas tareas o si las estás priorizando correctamente.`});
    if(habitRate>=0.8) tips.push({label:'Consistencia de hábitos',text:`${Math.round(habitRate*100)}% de hábitos completados hoy. La consistencia diaria es el único indicador que predice resultados a largo plazo.`});
    else if(habits.length>0&&habitRate<0.5) tips.push({label:'Hábitos en riesgo',text:`Menos del 50% de hábitos completados. Cada día sin ejecutarlos aumenta la probabilidad de abandono.`});
    if(maxStreak>=7) tips.push({label:`Racha de ${maxStreak} días`,text:`Mantener una racha de ${maxStreak} días requiere disciplina real. No la rompas — el costo psicológico de reiniciar es alto.`});
    if(avgCompletion>=70) tips.push({label:`Promedio ${avgCompletion}% en ${period} días`,text:`Tu consistencia en el período analizado está en ${avgCompletion}%. Eso te coloca en el percentil superior de usuarios productivos.`});
    if(pendingImportant>2) tips.push({label:'Zona de planificación',text:`${pendingImportant} tareas importantes sin fecha urgente. Bloquea tiempo en tu agenda esta semana antes de que se vuelvan urgentes.`});
    if(hour<10) tips.push({label:'Ventana de máximo rendimiento',text:'Las primeras horas del día son tu activo más valioso. Atácalas con las tareas de mayor impacto antes de que lleguen las interrupciones.'});
    else if(hour>=22) tips.push({label:'Cierre del día',text:'Revisa qué quedó sin hacer y muévelo a mañana conscientemente. Cerrar el día con intención reduce la ansiedad nocturna.'});
    if(xp>=1000) tips.push({label:`${xp} XP acumulados`,text:`Estás en el rango ${rank.label}. El progreso sostenido supera siempre al esfuerzo intenso pero esporádico.`});
    if(tips.length===0) tips.push({label:'Sistema en orden',text:'Todas tus métricas están dentro del rango óptimo. Mantén el ritmo y revisa tus objetivos de largo plazo.'});
    return tips;
  },[tasks,habits,xp,doneT,doneH,hour,avgCompletion,period]);

  return(
    <div className="fade-in">
      <div className="grid-2" style={{marginBottom:14}}>
        <div className="card">
          <div className="section-label">Diagnóstico del día</div>
          {insights.map((ins,i)=>(
            <div key={i} style={{paddingBottom:14,marginBottom:14,borderBottom:i<insights.length-1?'1px solid var(--b1)':'none'}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--g2)',marginBottom:5}}>{ins.label}</div>
              <div style={{fontSize:13,lineHeight:1.75,color:'var(--text)'}}>{ins.text}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="section-label">Métricas del día</div>
          {[
            ['Tareas completadas',`${doneT} / ${tasks.length}`,tasks.length?Math.round(doneT/tasks.length*100):0],
            ['Hábitos completados',`${doneH} / ${habits.length}`,habits.length?Math.round(doneH/habits.length*100):0],
            ['XP total acumulado',xp,Math.min(xp/150*100,100)],
            ['Rango actual',rank.label,null],
          ].map(([l,v,pct])=>(
            <div key={l} style={{padding:'10px 0',borderBottom:'1px solid var(--b1)'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:pct!=null?6:0}}>
                <span style={{color:'var(--g1)'}}>{l}</span>
                <span style={{fontWeight:700}}>{v}</span>
              </div>
              {pct!=null&&<ProgBar pct={pct} color='var(--text)' height={1}/>}
            </div>
          ))}
        </div>
      </div>

      {/* Long-term trend */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div className="section-label" style={{marginBottom:0}}>Tendencia de hábitos</div>
          <div style={{display:'flex',gap:6}}>
            {[7,30,90].map(p=>(<button key={p} onClick={()=>setPeriod(p)} className="btn btn-sm"
              style={{background:period===p?'var(--s3)':'transparent',color:period===p?'var(--text)':'var(--g2)',border:`1px solid ${period===p?'var(--b2)':'var(--b1)'}`}}>{p}d</button>))}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80,marginBottom:10}}>
          {periodData.map((d,i)=>(
            <div key={i} title={`${d.label}: ${d.pct}%`}
              style={{flex:1,height:`${Math.max(d.pct,2)}%`,borderRadius:'2px 2px 0 0',
                background:d.pct>=80?'var(--text)':d.pct>=50?'var(--g1)':'var(--g3)',
                transition:'height .3s ease',cursor:'default'}}/>
          ))}
        </div>
        <div style={{display:'flex',gap:16,paddingTop:10,borderTop:'1px solid var(--b1)'}}>
          <div><div style={{fontSize:18,fontWeight:700}}>{avgCompletion}%</div><div style={{fontSize:9,color:'var(--g2)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>Promedio {period}d</div></div>
          <div><div style={{fontSize:18,fontWeight:700}}>{bestDay.pct}%</div><div style={{fontSize:9,color:'var(--g2)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>Mejor día</div></div>
          <div><div style={{fontSize:18,fontWeight:700}}>{habits.length?Math.max(...habits.map(h=>h.streak||0)):0}</div><div style={{fontSize:9,color:'var(--g2)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>Racha máx.</div></div>
        </div>
      </div>

      <div className="card">
        <div className="section-label">Distribución por área</div>
        {AREAS.map(a=>{
          const count=tasks.filter(t=>t.cat===a).length;
          const done=tasks.filter(t=>t.cat===a&&t.done).length;
          if(!count)return null;
          return(
            <div key={a} style={{display:'flex',alignItems:'center',gap:14,padding:'9px 0',borderBottom:'1px solid var(--b1)'}}>
              <div style={{width:72,fontSize:12,color:'var(--g1)',textTransform:'capitalize'}}>{a}</div>
              <div style={{flex:1}}><ProgBar pct={done/count*100} color='var(--text)' height={1}/></div>
              <div style={{fontSize:11,color:'var(--g2)',width:32,textAlign:'right'}}>{done}/{count}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
});


// ─── Calendar ────────────────────────────────────────────────────────────────
const CalendarTab=memo(({tasks,habits,reminders,setTab})=>{
  const [offset,setOffset]=useState(0);// month offset from today

  const base=useMemo(()=>{
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);return d;
  },[offset]);

  const year=base.getFullYear();
  const month=base.getMonth();
  const monthName=base.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const firstDay=(base.getDay()+6)%7;// Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const getKey=(d)=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const today=todayKey();

  const tasksByDay=useMemo(()=>{
    const m={};
    tasks.forEach(t=>{
      const k=t.date||'';
      if(k&&k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)){
        const d=parseInt(k.split('-')[2]);
        if(!m[d])m[d]=[];m[d].push(t);
      }
    });
    return m;
  },[tasks,year,month]);

  const habitsByDay=useMemo(()=>{
    const m={};
    for(let d=1;d<=daysInMonth;d++){
      const k=getKey(d);
      const done=habits.filter(h=>(h.history||[]).includes(k)).length;
      if(done>0)m[d]=done;
    }
    return m;
  },[habits,daysInMonth]);

  const remindersByDay=useMemo(()=>{
    const m={};
    reminders.forEach(r=>{
      if(!r.datetime)return;
      const k=r.datetime.slice(0,10);
      if(k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)){
        const d=parseInt(k.split('-')[2]);
        if(!m[d])m[d]=[];m[d].push(r);
      }
    });
    return m;
  },[reminders,year,month]);

  const [selected,setSelected]=useState(null);
  const selKey=selected?getKey(selected):null;
  const selTasks=tasks.filter(t=>t.date===selKey);
  const selReminders=(remindersByDay[selected]||[]);
  const selHabits=habits.filter(h=>(h.history||[]).includes(selKey||''));

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:600,textTransform:'capitalize'}}>{monthName}</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOffset(o=>o-1)}>← Anterior</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOffset(0)}>Hoy</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOffset(o=>o+1)}>Siguiente →</button>
        </div>
      </div>

      <div className="grid-2" style={{gap:20,alignItems:'start'}}>
        <div>
          {/* Days header */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {['L','M','X','J','V','S','D'].map(d=>(<div key={d} style={{textAlign:'center',fontSize:9,color:'var(--g2)',fontWeight:700,letterSpacing:'.1em',padding:'4px 0'}}>{d}</div>))}
          </div>
          {/* Grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {cells.map((d,i)=>{
              if(!d)return <div key={i}/>;
              const k=getKey(d);
              const isToday=k===today;
              const isSel=selected===d;
              const hasTasks=(tasksByDay[d]||[]).length>0;
              const habitDone=habitsByDay[d]||0;
              const hasReminder=(remindersByDay[d]||[]).length>0;
              return(
                <div key={i} onClick={()=>setSelected(isSel?null:d)}
                  style={{
                    aspectRatio:'1',borderRadius:6,cursor:'pointer',padding:'6px 4px',
                    background:isSel?'var(--s2)':isToday?'var(--s3)':'transparent',
                    border:`1px solid ${isSel?'var(--b3)':isToday?'var(--b2)':'var(--b1)'}`,
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',
                    transition:'all .12s',
                  }}>
                  <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?'var(--text)':'var(--g1)',lineHeight:1,marginBottom:4}}>{d}</div>
                  <div style={{display:'flex',gap:2,flexWrap:'wrap',justifyContent:'center'}}>
                    {hasTasks&&<div style={{width:4,height:4,borderRadius:'50%',background:'var(--text)'}}/>}
                    {habitDone>0&&<div style={{width:4,height:4,borderRadius:'50%',background:'var(--g2)'}}/>}
                    {hasReminder&&<div style={{width:4,height:4,borderRadius:'50%',background:'var(--g3)'}}/>}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:'flex',gap:14,marginTop:12,padding:'10px 0',borderTop:'1px solid var(--b1)'}}>
            {[['var(--text)','Tareas'],['var(--g2)','Hábitos'],['var(--g3)','Recordatorios']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--g2)'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:c}}/>{l}
              </div>
            ))}
          </div>
        </div>

        {/* Day detail */}
        <div>
          {selected?(
            <div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--b1)'}}>
                {new Date(year,month,selected).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}
              </div>
              {selTasks.length>0&&(
                <div style={{marginBottom:14}}>
                  <div className="section-label">Tareas</div>
                  {selTasks.map(t=><div key={t.id} style={{fontSize:12,padding:'6px 0',borderBottom:'1px solid var(--b1)',color:t.done?'var(--g2)':'var(--text)',textDecoration:t.done?'line-through':'none'}}>{t.text}</div>)}
                </div>
              )}
              {selHabits.length>0&&(
                <div style={{marginBottom:14}}>
                  <div className="section-label">Hábitos completados</div>
                  {selHabits.map(h=><div key={h.id} style={{fontSize:12,padding:'6px 0',borderBottom:'1px solid var(--b1)',color:'var(--g1)'}}>{h.emoji} {h.name}</div>)}
                </div>
              )}
              {selReminders.length>0&&(
                <div style={{marginBottom:14}}>
                  <div className="section-label">Recordatorios</div>
                  {selReminders.map(r=><div key={r.id} style={{fontSize:12,padding:'6px 0',borderBottom:'1px solid var(--b1)',color:'var(--g1)'}}>{r.text}</div>)}
                </div>
              )}
              {selTasks.length===0&&selHabits.length===0&&selReminders.length===0&&(
                <div style={{color:'var(--g2)',fontSize:12,padding:'20px 0',textAlign:'center'}}>Sin actividad registrada.</div>
              )}
            </div>
          ):(
            <div style={{color:'var(--g2)',fontSize:12,padding:'40px 0',textAlign:'center'}}>Selecciona un día para ver el detalle</div>
          )}
        </div>
      </div>
    </div>
  );
});

// ─── Weekly Review ────────────────────────────────────────────────────────────
const WeeklyReviewTab=memo(({tasks,habits,goals,xp,tk,addXP})=>{
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({wins:'',lessons:'',priorities:'',blockers:'',nextWeek:''});
  const [saved,setSaved]=useState(()=>{
    try{const v=localStorage.getItem('kro2_review');return v?JSON.parse(v):[];}catch{return [];}
  });

  // Last 7 days stats
  const last7=useMemo(()=>{
    const arr=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      const doneT=tasks.filter(t=>t.done&&t.doneDate===k).length;
      const doneH=habits.filter(h=>(h.history||[]).includes(k)).length;
      arr.push({k,d:d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'}),t:doneT,h:doneH});
    }
    return arr;
  },[tasks,habits]);

  const weekTasks=tasks.filter(t=>t.done).length;
  const weekHabits=habits.reduce((s,h)=>{
    const days=last7.filter(d=>(h.history||[]).includes(d.k)).length;
    return s+days;
  },0);
  const maxStreak=habits.length?Math.max(...habits.map(h=>h.streak||0)):0;

  const STEPS=[
    {title:'Logros de la semana',field:'wins',placeholder:'¿Qué completaste? ¿Qué te enorgullece de esta semana?',hint:'Sé específico. Los logros pequeños también cuentan.'},
    {title:'Lecciones aprendidas',field:'lessons',placeholder:'¿Qué no funcionó? ¿Qué harías diferente?',hint:'Sin juicio. Solo datos para mejorar.'},
    {title:'Prioridades de la próxima semana',field:'nextWeek',placeholder:'¿Cuáles son tus 3 tareas más importantes de la próxima semana?',hint:'No más de 3. La claridad vale más que la cantidad.'},
    {title:'Obstáculos anticipados',field:'blockers',placeholder:'¿Qué podría interrumpir tu plan?',hint:'Anticipa para que no te sorprenda.'},
  ];

  const saveReview=()=>{
    const review={id:Date.now(),date:tk,xp,...answers,stats:{weekTasks,weekHabits,maxStreak}};
    const updated=[review,...saved].slice(0,12);
    localStorage.setItem('kro2_review',JSON.stringify(updated));
    setSaved(updated);
    addXP(50,'Revisión semanal completada');
    setStep(5);
  };

  if(step===5)return(
    <div className="fade-in" style={{maxWidth:560,margin:'0 auto',paddingTop:40,textAlign:'center'}}>
      <div style={{fontSize:32,marginBottom:16}}>★</div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>Revisión completada</div>
      <div style={{fontSize:13,color:'var(--g1)',marginBottom:28,lineHeight:1.7}}>+50 XP añadidos. La reflexión semanal es el hábito que más impacta en tu progreso a largo plazo.</div>
      <button className="btn btn-ghost" onClick={()=>setStep(0)}>Nueva revisión</button>
    </div>
  );

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24,paddingBottom:16,borderBottom:'1px solid var(--b1)'}}>
        <div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:3}}>Revisión Semanal</div>
          <div style={{fontSize:11,color:'var(--g1)'}}>Ritual de cierre · {new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <div style={{fontSize:11,color:'var(--g2)',textAlign:'right'}}>
          {step<4?`Paso ${step+1} de 4`:'Resumen'}
        </div>
      </div>

      {/* Stats summary */}
      {step===0&&(
        <div className="grid-4" style={{marginBottom:24}}>
          {[
            ['Tareas completadas esta semana',weekTasks],
            ['Hábitos totales (7 días)',weekHabits],
            ['Racha máxima activa',maxStreak+' días'],
            ['XP acumulado',xp],
          ].map(([l,v])=>(
            <div key={l} className="card" style={{textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{v}</div>
              <div style={{fontSize:10,color:'var(--g2)',letterSpacing:'.06em',textTransform:'uppercase',lineHeight:1.4}}>{l}</div>
            </div>
          ))}
        </div>
      )}

      {/* Progress bar */}
      <div style={{marginBottom:24}}>
        <div style={{display:'flex',gap:4}}>
          {STEPS.map((_,i)=>(
            <div key={i} style={{flex:1,height:2,borderRadius:1,background:i<=step?'var(--text)':'var(--b2)',transition:'background .3s'}}/>
          ))}
        </div>
      </div>

      {/* Step */}
      {step<4&&(
        <div style={{maxWidth:560}}>
          <div className="section-label">{STEPS[step].title}</div>
          <div style={{fontSize:11,color:'var(--g2)',marginBottom:12,lineHeight:1.6}}>{STEPS[step].hint}</div>
          <textarea className="inp" rows={5} value={answers[STEPS[step].field]}
            onChange={e=>setAnswers(a=>({...a,[STEPS[step].field]:e.target.value}))}
            placeholder={STEPS[step].placeholder}
            style={{resize:'vertical',lineHeight:1.7,fontSize:13}}/>
          <div style={{display:'flex',gap:10,marginTop:14}}>
            {step>0&&<button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>← Anterior</button>}
            <button className="btn btn-red" onClick={()=>step<3?setStep(s=>s+1):saveReview()}
              style={{marginLeft:'auto'}}>
              {step<3?'Siguiente →':'Guardar revisión'}
            </button>
          </div>
        </div>
      )}

      {/* Past reviews */}
      {saved.length>0&&step===0&&(
        <div style={{marginTop:28}}>
          <div className="section-label">Revisiones anteriores</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {saved.map(r=>(
              <div key={r.id} className="card" style={{opacity:.7}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:600}}>{new Date(r.date).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
                  <div style={{fontSize:10,color:'var(--g2)'}}>{r.stats?.weekTasks||0} tareas · {r.xp} XP</div>
                </div>
                {r.wins&&<div style={{fontSize:11,color:'var(--g1)',lineHeight:1.5}}>{r.wins.substring(0,120)}{r.wins.length>120?'…':''}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
});

// ─── Books ───────────────────────────────────────────────────────────────────
const BooksTab=memo(({books,setBooks})=>{

  const save=()=>{
    if(!nb.title.trim())return;
    setBooks(bs=>[...bs,{id:Date.now(),...nb,pages:parseInt(nb.pages)||0,addedAt:new Date().toISOString().slice(0,10)}]);

          <div style={{fontSize:32,marginBottom:12}}>□</div>

          <div style={{fontSize:11}}>Agrega libros que leas y registra lo que aprendes</div>
        </div>
      )}
    </div>
  );
});

// ─── Mount (no StrictMode = no double-render flicker) ────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
